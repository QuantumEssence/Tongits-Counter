name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Copy Web Assets
        run: |
          mkdir -p android/app/src/main/assets/public
          cp www/index.html android/app/src/main/assets/public/
          cp www/styles.css android/app/src/main/assets/public/
          cp www/app.js android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
